<body><fieldset>
  <legend>Inscription</legend>
  <form action="inscription.php" method="post" onsubmit="return inscription()" >
    
      <label class="label">Nom : </label>

     <label class="label">Adresse email : </label>

      <label class="label">Date de naissance : </label>

      <label class="label">

  </form>
